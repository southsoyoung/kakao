<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>나만의 카카오맵 검색 서비스</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body, html {
            width: 100%;
            height: 100%;
            font-family: 'Malgun Gothic', dotum, sans-serif;
        }
        .container {
            display: flex;
            width: 100%;
            height: 100%;
        }
        /* [조건 1] 왼쪽 검색창 영역 */
        .sidebar {
            width: 350px;
            height: 100%;
            background-color: #f8f9fa;
            padding: 20px;
            box-shadow: 2px 0 5px rgba(0,0,0,0.1);
            z-index: 10;
            display: flex;
            flex-direction: column;
        }
        .search-box {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        .search-box input {
            flex: 1;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 14px;
        }
        .search-box button {
            padding: 10px 15px;
            background-color: #fee500;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }
        .search-box button:hover {
            background-color: #fada0a;
        }
        .result-list {
            overflow-y: auto;
            flex: 1;
            list-style: none;
        }
        .result-item {
            padding: 15px 10px;
            border-bottom: 1px solid #eee;
            cursor: pointer;
        }
        .result-item:hover {
            background-color: #f0f0f0;
        }
        /* [조건 1] 오른쪽 지도 영역 */
        .map-area {
            flex: 1;
            height: 100%;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="sidebar">
            <h2>장소 검색</h2>
            <hr style="margin: 15px 0; border: 0; height: 1px; background: #ccc;">
            <div class="search-box">
                <input type="text" id="keyword" placeholder="검색할 장소를 입력하세요" onkeypress="if(event.keyCode==13) searchPlaces()">
                <button onclick="searchPlaces()">검색</button>
            </div>
            <ul id="placesList" class="result-list"></ul>
        </div>

        <div id="map" class="map-area"></div>
    </div>

    <script type="text/javascript" src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=a0fd20fafdd0521fd9c52e4454561f37&libraries=services&autoload=false"></script>
    <script>
        let map;
        let ps; 
        let infowindow;

        // [조건 3 반영] 카카오 스크립트 파일이 100% 로드된 후 실행 보장
        kakao.maps.load(function() {
            // 지도 초기화는 스크립트 로드 후에 진행해야 에러가 안 납니다!
            initMap();
        });

        function initMap() {
            const mapContainer = document.getElementById('map'); 
            
            // 기본 중심좌표 설정 (사용자가 위치 권한을 거부할 때를 대비한 안전장치)
            const defaultOption = {
                center: new kakao.maps.LatLng(37.566826, 126.9786567), // 서울시청 기본값
                level: 5 // [조건] 확대 레벨 5
            };

            // 지도 객체 생성
            map = new kakao.maps.Map(mapContainer, defaultOption);
            ps = new kakao.maps.services.Places();
            infowindow = new kakao.maps.InfoWindow({zIndex:1});

            // [조건 2 반영] 지도가 켜지자마자 바로 사용자 위치 권한을 허용받아 중심으로 이동
            setCurrentLocation();
        }

        // 현재 위치를 받아 지도 중심을 옮기는 함수
        function setCurrentLocation() {
            if (navigator.geolocation) {
                // 브라우저에 위치 권한 팝업을 띄우고 위치를 가져옵니다.
                navigator.geolocation.getCurrentPosition(function(position) {
                    const lat = position.coords.latitude;  // 위도
                    const lon = position.coords.longitude; // 경도
                    
                    const locPosition = new kakao.maps.LatLng(lat, lon);
                    
                    // 지도의 중심을 내 현재 위치로 변경!
                    map.setCenter(locPosition);
                    
                    // 현재 위치에 표시할 마커 생성
                    const currentMarker = new kakao.maps.Marker({
                        map: map,
                        position: locPosition
                    });
                    
                    infowindow.setContent('<div style="padding:5px;font-size:12px;text-align:center;">📍 내 현재 위치</div>');
                    infowindow.open(map, currentMarker);

                }, function(error) {
                    console.log("위치 권한을 거부했거나 내 위치를 찾을 수 없어 기본 위치(서울시청)로 표시합니다.");
                });
            } else {
                alert("이 브라우저에서는 GPS 내 위치 기능을 지원하지 않습니다.");
            }
        }

        // 키워드 장소 검색 함수
        function searchPlaces() {
            const keyword = document.getElementById('keyword').value;

            if (!keyword.trim()) {
                alert('검색어를 입력해주세요!');
                return false;
            }

            ps.keywordSearch(keyword, placesSearchCB); 
        }

        // 검색 완료 콜백
        function placesSearchCB(data, status) {
            if (status === kakao.maps.services.Status.OK) {
                displayPlaces(data);
            } else if (status === kakao.maps.services.Status.ZERO_RESULT) {
                alert('검색 결과가 없습니다.');
            } else if (status === kakao.maps.services.Status.ERROR) {
                alert('검색 중 에러가 발생했습니다.');
            }
        }

        // 결과 목록과 마커 표시
        function displayPlaces(places) {
            const listEl = document.getElementById('placesList');
            const bounds = new kakao.maps.LatLngBounds();
            
            listEl.innerHTML = ''; // 이전 결과 초기화

            for (let i = 0; i < places.length; i++) {
                const placePosition = new kakao.maps.LatLng(places[i].y, places[i].x);
                const marker = new kakao.maps.Marker({
                    map: map,
                    position: placePosition
                });

                bounds.extend(placePosition);

                const itemEl = document.createElement('li');
                itemEl.className = 'result-item';
                itemEl.innerHTML = `<h5><strong>${places[i].place_name}</strong></h5><small style="color:#666">${places[i].address_name}</small>`;
                
                // 마커 및 리스트 클릭 이벤트 연동
                (function(marker, title) {
                    kakao.maps.event.addListener(marker, 'click', function() {
                        displayInfowindow(marker, title);
                    });
                    itemEl.onclick = function() {
                        displayInfowindow(marker, title);
                        map.panTo(marker.getPosition()); // 클릭한 곳으로 부드럽게 이동
                    };
                })(marker, places[i].place_name);

                listEl.appendChild(itemEl);
            }

            // 검색된 모든 장소가 다 보이도록 지도 범위 조절
            map.setBounds(bounds);
        }

        // 말풍선(인포윈도우) 표시
        function displayInfowindow(marker, title) {
            const content = `<div style="padding:5px;z-index:1;font-size:12px;color:black;text-align:center;">${title}</div>`;
            infowindow.setContent(content);
            infowindow.open(map, marker);
        }
    </script>
</body>
</html>
